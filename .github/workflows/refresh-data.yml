name: Refresh Static Data

on:
  schedule:
    - cron: "17 0,8,16 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: refresh-static-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync static data
        run: bun run sync:data

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet -- public/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint
        if: steps.changes.outputs.changed == 'true'
        run: bun run lint

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: bun run build

      - name: Commit refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(data): refresh static data"
          git push

      - name: Trigger Pages deploy
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
